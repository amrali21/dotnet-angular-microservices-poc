<div class="card flex m-2 ml-0">
    <input type="text" pInputText [(ngModel)]="query" />
    <button pButton pRipple (click)="search()" label="Search" class="p-button-success ml-3"></button>

</div>
<div class="card">
    <p-table [value]="invoicesList" styleClass="p-datatable-gridlines" [paginator]="true" [rows]="filter.pageSize"
        [first]="filter.pageSize * filter.pageIndex" [totalRecords]="invoiceListLength" lazy="true"
        (onPage)="onPage($event)" [rowsPerPageOptions]="[5, 10, 20]">
        <ng-template pTemplate="header">
            <tr>
                <th>Id</th>
                <th>Amount</th>
                <th>Name</th>
                <th>Email</th>
                <th></th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-invoice>
            <tr>
                <td>{{ invoice.id }}</td>
                <td>{{ invoice.amount }}</td>
                <td>{{ invoice.name }}</td>
                <td>{{ invoice.email}}</td>
                <td>
                    <p-button class="mr-5" label="Edit" [raised]="true" severity="secondary" routerLink="{{invoice.id}}"
                        routerLinkActive="active" />

                    <p-button label="Delete" [raised]="true" severity="danger" (click)="deleteInvoice(invoice.id)"
                        routerLinkActive="active" />

                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
