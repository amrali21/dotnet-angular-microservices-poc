worker_processes  1;

events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    #gzip  on;

    #server_start
    server {
        listen       85;
        server_name  live;


        location / {
	    root  mysites/blue;
	    try_files $uri /index.html;
        }
        
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
    #server_end
    
    # another virtual host using mix of IP-, name-, and port-based configuration
    
    #server_start
    server {
        listen       86;
        server_name  test;


        location / {
	    root  mysites/green;
	    try_files $uri /index.html;
        }
    }
    #server_end
}

