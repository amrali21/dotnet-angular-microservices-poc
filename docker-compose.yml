networks:
  microservices-net:
    driver: bridge

services:
  eureka-server:
    build:
      context: ./eureka-server
    # Registry-qualified name (Docker Hub) so `docker compose push` can publish it.
    # NOTE: eureka is NOT used by the k8s deployment (k8s-native discovery) — it
    # is pushed only for completeness of the compose stack.
    image: xamrxxx/eureka-server:${TAG:-latest}
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  invoice-service:
    build:
      context: ./nextjs-backend-invoice-service
    image: xamrxxx/invoice-service:${TAG:-latest}
    container_name: invoice-service
    ports:
      - "5052:5052"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:5052
      - "ConnectionStrings__DefaultConnection=Data Source=host.docker.internal\\SQLEXPRESS;Initial Catalog=nextjs-test;User ID=${SQL_USER};Password=${SQL_PASSWORD};TrustServerCertificate=True"
    networks:
      - microservices-net
    depends_on:
      eureka-server:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  cust-service:
    build:
      context: ./nextjs-backend-cust-service
    image: xamrxxx/cust-service:${TAG:-latest}
    container_name: cust-service
    ports:
      - "5246:5246"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:5246
      - "ConnectionStrings__DefaultConnection=Data Source=host.docker.internal\\SQLEXPRESS;Initial Catalog=nextjs-test;User ID=${SQL_USER};Password=${SQL_PASSWORD};TrustServerCertificate=True"
    networks:
      - microservices-net
    depends_on:
      eureka-server:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dashboard-service:
    build:
      context: ./nextjs-backend-dashboard-service
    image: xamrxxx/dashboard-service:${TAG:-latest}
    container_name: dashboard-service
    ports:
      - "5208:5208"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:5208
      - "ConnectionStrings__DefaultConnection=Data Source=host.docker.internal\\SQLEXPRESS;Initial Catalog=nextjs-test;User ID=${SQL_USER};Password=${SQL_PASSWORD};TrustServerCertificate=True"
    networks:
      - microservices-net
    depends_on:
      eureka-server:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  api-gateway:
    build:
      context: ./next-api-gateway
    image: xamrxxx/api-gateway:${TAG:-latest}
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - microservices-net
    depends_on:
      eureka-server:
        condition: service_healthy

  angular-frontend:
    build:
      context: ./angular-frontend
    # Default build bakes the "docker" Angular config (ACTION_URL=http://localhost:8080).
    # For the k8s/cloud image build with docker-compose.push.yml, which overrides
    # the NG_CONFIG build-arg to "kubernetes" (ACTION_URL='' -> same-origin via Ingress).
    image: xamrxxx/angular-frontend:${TAG:-latest}
    container_name: angular-frontend
    ports:
      - "4200:80"
    networks:
      - microservices-net
    depends_on:
      - api-gateway
