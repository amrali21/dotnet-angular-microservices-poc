# ----------------------------------------------------------------------------
# TEMPLATE — copy this to 01-db-secret.yaml and fill in your real credentials.
#
#   cp k8s/01-db-secret.example.yaml k8s/01-db-secret.yaml
#   # then edit the password in 01-db-secret.yaml
#
# 01-db-secret.yaml is gitignored on purpose so real credentials are never
# committed. This .example file (placeholders only) IS committed, so the repo
# documents what the secret should look like. kustomization.yaml references
# 01-db-secret.yaml, so that file must exist locally before `kubectl apply -k`.
#
# Database connection — the BIGGEST "risky assumption" fix from docker-compose.
# In compose the services pointed at `host.docker.internal\SQLEXPRESS` (a SQL
# Server on YOUR laptop). That host does not exist inside a cluster, so the
# connection string must point at a SQL Server the pods can actually reach.
#
# NOTE: a named instance like HOST\SQLEXPRESS is generally NOT reachable from a
# pod. Use  Data Source=<host>,<port>  (comma + port, NO instance name).
#
# LOCAL TESTING with minikube + SQL Server Express on your Windows host:
#   - `localhost` does NOT work: inside a pod it means the pod itself.
#     Use `host.minikube.internal`, which resolves to your host machine.
#   - The `\SQLEXPRESS` named instance uses a dynamic port via SQL Browser (UDP
#     1434) and is unreliable across the minikube boundary. Give SQL Express a
#     STATIC TCP port and connect by host,port instead (drop the instance name).
#   Host-side one-time setup (SQL Server Configuration Manager):
#     1. Protocols for SQLEXPRESS -> enable TCP/IP
#     2. TCP/IP -> IP Addresses -> IPAll -> TCP Dynamic Ports = (blank),
#        TCP Port = 1433 ; then restart the SQL Server (SQLEXPRESS) service
#     3. Enable mixed-mode (SQL) auth and your SQL login/password
#     4. Windows Firewall: allow inbound TCP 1433
#   Verify from a pod:
#     kubectl run netcheck --rm -it --image=busybox -n microservices -- \
#       sh -c "nc -zv host.minikube.internal 1433"
# ----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: microservices
type: Opaque
stringData:
  # .NET reads this as ConnectionStrings:DefaultConnection (override of appsettings.json)
  #
  # LOCAL (minikube -> SQL Express on the Windows host) — set your real password:
  ConnectionStrings__DefaultConnection: "Data Source=host.minikube.internal,1433;Initial Catalog=nextjs-test;User ID=sa;Password=CHANGE_ME_PASSWORD;TrustServerCertificate=True"
  #
  # CLOUD / real server — replace host with a managed instance or DB server:
  # ConnectionStrings__DefaultConnection: "Data Source=CHANGE_ME_SQL_HOST,1433;Initial Catalog=nextjs-test;User ID=CHANGE_ME_USER;Password=CHANGE_ME_PASSWORD;TrustServerCertificate=True"
