# Apply everything in one shot:   kubectl apply -k k8s/
# Tear it all down:               kubectl delete -k k8s/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: microservices

resources:
  - 00-namespace.yaml
  - 01-db-secret.yaml
  - 02-common-config.yaml
  - 03-gateway-ocelot-config.yaml
  - 10-invoice-service.yaml
  - 11-cust-service.yaml
  - 12-dashboard-service.yaml
  - 13-api-gateway.yaml
  - 14-angular-frontend.yaml
  - 20-ingress.yaml
  - 30-hpa.yaml

# Rewrites the bare `image:` names in the Deployments to the Docker Hub registry
# at apply time — the Deployment YAMLs stay registry-agnostic. Bump `newTag` here
# to match the TAG you built/pushed with docker-compose, then `kubectl apply -k k8s/`.
# (eureka-server is intentionally absent — k8s uses K8s-native discovery, not Eureka.)
images:
  - name: invoice-service
    newName: xamrxxx/invoice-service
    newTag: "v2"
  - name: cust-service
    newName: xamrxxx/cust-service
    newTag: "v2"
  - name: dashboard-service
    newName: xamrxxx/dashboard-service
    newTag: "v2"
  - name: api-gateway
    newName: xamrxxx/api-gateway
    newTag: "v2"
  - name: angular-frontend
    newName: xamrxxx/angular-frontend
    newTag: "v2"

# following block is used to test whether kubernetes would pull the latest image from the registry instead of using a cached image. 
# a better solution is to delete images in minikube and then run `kubectl apply -k k8s/` again.

