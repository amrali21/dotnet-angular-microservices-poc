# ----------------------------------------------------------------------------
# Horizontal Pod Autoscalers — the payoff of K8s-native discovery.
#
# Because each service sits behind a ClusterIP Service that load-balances across
# pods, we can add/remove pods freely and traffic spreads automatically. The HPA
# watches CPU and scales replica count between min and max.
#
# Requires metrics-server in the cluster (it provides the CPU numbers):
#   minikube addons enable metrics-server
# HPAs also REQUIRE resource requests on the pods (set in each Deployment) — the
# CPU target percentage is measured against the request.
# ----------------------------------------------------------------------------
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: invoice-service
  namespace: microservices
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: invoice-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
