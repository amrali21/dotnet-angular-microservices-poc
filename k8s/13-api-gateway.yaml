apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: microservices
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
          envFrom:
            - configMapRef:
                name: dotnet-common-config   # also disables the gateway's Eureka client
          volumeMounts:
            # Replace the Eureka-based ocelot.json baked into the image with the
            # Kubernetes (direct-DNS) routing from the gateway-ocelot-config ConfigMap.
            - name: ocelot-config
              mountPath: /app/ocelot.json
              subPath: ocelot.json
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
      volumes:
        - name: ocelot-config
          configMap:
            name: gateway-ocelot-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: microservices
  labels:
    app: api-gateway
spec:
  type: ClusterIP          # internal — the Ingress is the only public entry point
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
